<!DOCTYPE html>

<html lang="ru">

<head>

  <meta charset="utf-8"/>

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>

  <meta name="theme-color" content="#e8eaed"/>

  <title>Канал</title>

  <link rel="stylesheet" href="/messenger/supra-messenger.css?v=auto"/>

  <style>

    :root {

      --m-bg: #e8eaed;

      --m-surface: #fff;

      --m-border: #d8dbe0;

      --m-text: #1c1c1e;

      --m-text-secondary: #6b7280;

      --m-accent: #4a7fc4;

      --m-other-bubble-bg: #fff;

      --m-other-bubble-text: #1c1c1e;

      --m-image-slot-bg: rgba(127, 127, 127, .08);

    }

    html, body {

      margin: 0;

      height: 100%;

      background: var(--m-bg);

      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

      font-size: 15px;

      line-height: 1.4;

      color: var(--m-text);

      -webkit-font-smoothing: antialiased;

      -moz-osx-font-smoothing: grayscale;

    }

    .cv-root {

      display: flex;

      flex-direction: column;

      height: 100%;

      max-width: 720px;

      margin: 0 auto;

      background: var(--m-bg);

    }

    .cv-header {

      display: flex;

      align-items: center;

      gap: 12px;

      padding: 12px 16px;

      background: var(--m-surface);

      border-bottom: 1px solid var(--m-border);

      flex-shrink: 0;

    }

    .cv-header-avatar {

      width: 48px;

      height: 48px;

      border-radius: 50%;

      object-fit: cover;

      flex-shrink: 0;

      background: var(--cv-avatar-bg, #5b8dd9);

      color: #fff;

      display: flex;

      align-items: center;

      justify-content: center;

      font-size: 17px;

      font-weight: 600;

      letter-spacing: .02em;

      user-select: none;

    }

    .cv-header-avatar img {

      width: 100%;

      height: 100%;

      border-radius: 50%;

      object-fit: cover;

      display: block;

    }

    .cv-header-text h1 {

      margin: 0;

      font-size: 17px;

      font-weight: 600;

      line-height: 1.25;

      color: var(--m-text);

    }

    .cv-header-text p {

      margin: 3px 0 0;

      font-size: 14px;

      line-height: 1.35;

      color: var(--m-text-secondary);

    }

    .cv-messages {

      flex: 1;

      overflow-y: auto;

      padding: 12px 12px 24px;

      display: flex;

      flex-direction: column;

      gap: 6px;

      -webkit-overflow-scrolling: touch;

    }

    .cv-msg-row {

      display: flex;

      justify-content: flex-start;

      max-width: 100%;

    }

    .cv-msg-row .mc-bubble {

      max-width: min(320px, 88vw);

      background: var(--m-other-bubble-bg);

      color: var(--m-other-bubble-text);

      border-bottom-left-radius: 4px;

    }

    .cv-msg-row .mc-image-bubble,

    .cv-msg-row .mc-photo-album-bubble {

      padding: 2px !important;

    }

    .cv-msg-time {

      font-size: 11px;

      color: var(--m-text-secondary);

      margin-top: 2px;

      padding: 0 4px 2px;

      text-align: right;

      opacity: .85;

    }

    .cv-footer {

      padding: 14px 16px calc(14px + env(safe-area-inset-bottom, 0px));

      text-align: center;

      background: var(--m-surface);

      border-top: 1px solid var(--m-border);

      flex-shrink: 0;

    }

    .cv-footer a {

      color: var(--m-accent);

      text-decoration: none;

      font-weight: 500;

      font-size: 15px;

    }

    .cv-loading, .cv-error {

      flex: 1;

      display: flex;

      align-items: center;

      justify-content: center;

      color: var(--m-text-secondary);

      padding: 24px;

      text-align: center;

      font-size: 15px;

    }

    .cv-msg-row--highlight {

      animation: cv-highlight .35s ease;

    }

    @keyframes cv-highlight {

      from { background: rgba(74, 127, 196, .18); }

      to { background: transparent; }

    }

    /* Lightbox */

    .cv-viewer {

      position: fixed;

      inset: 0;

      z-index: 10000;

      background: rgba(0, 0, 0, .92);

      display: flex;

      flex-direction: column;

      touch-action: none;

    }

    .cv-viewer[hidden] { display: none !important; }

    .cv-viewer-toolbar {

      display: flex;

      align-items: center;

      justify-content: space-between;

      padding: 12px 16px;

      padding-top: calc(12px + env(safe-area-inset-top, 0px));

      color: #fff;

      flex-shrink: 0;

    }

    .cv-viewer-close {

      background: none;

      border: none;

      color: #fff;

      font-size: 28px;

      line-height: 1;

      padding: 4px 8px;

      cursor: pointer;

      opacity: .9;

    }

    .cv-viewer-counter {

      font-size: 14px;

      opacity: .85;

    }

    .cv-viewer-stage {

      flex: 1;

      display: flex;

      align-items: center;

      justify-content: center;

      min-height: 0;

      position: relative;

      overflow: hidden;

    }

    .cv-viewer-img {

      max-width: 100%;

      max-height: 100%;

      object-fit: contain;

      user-select: none;

      -webkit-user-drag: none;

    }

    .cv-viewer-nav {

      position: absolute;

      top: 50%;

      transform: translateY(-50%);

      background: rgba(255, 255, 255, .12);

      border: none;

      color: #fff;

      width: 44px;

      height: 44px;

      border-radius: 50%;

      font-size: 22px;

      cursor: pointer;

      display: flex;

      align-items: center;

      justify-content: center;

    }

    .cv-viewer-nav:disabled { opacity: .25; cursor: default; }

    .cv-viewer-nav--prev { left: 12px; }

    .cv-viewer-nav--next { right: 12px; }

  </style>

</head>

<body>

  <div class="cv-root" id="root">

    <div class="cv-loading" id="loading">Загрузка…</div>

  </div>

  <script src="/messenger/channel-view.js?v=auto"></script>

</body>

</html>
